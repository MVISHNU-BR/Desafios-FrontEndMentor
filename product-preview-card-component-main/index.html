<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="CSS/styles.css" />

    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <main class="container">
      <div class="content">
        <div>
          <picture>
            <source
              class=".perfume-img"
              srcset="images/image-mobile.jpg"
              media="(max-width: 23.4375rem)"
            />
            <img
              class="perfume-img"
              src="images/image-desktop.jpg"
              alt="Frasco perfume Chanel ao redor de folhas"
            />
          </picture>
        </div>
        <div class="card-content">
          <div class="text-content">
            <h1 class="title montserrat-4">PERFUME</h1>
            <h2 class="subtitle fraunces-bold">
              Gabrielle Essence Eau De Parfum
            </h2>

            <p class="montserrat-3">
              A floral, solar and voluptuous interpretation composed by Olivier
              Polge, Perfumer-Creator for the House of CHANEL.
            </p>
          </div>

          <div class="price fraunces-bold">
            <span class="new-price">$149.99</span>
            <span class="old-price montserrat-5">$169.99</span>
          </div>
          <button type="button" class="buy-button montserrat-2">
            <img src="images/icon-cart.svg" />Add to Cart
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
