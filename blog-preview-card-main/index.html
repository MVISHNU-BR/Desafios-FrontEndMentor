<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="content">
        <img
          src="assets/images/illustration-article.svg"
          alt="ilustration abstract for article"
        />
        <div class="text-container">
          <h2 class="">Learning</h2>

          <span class="">Published 21 Dec 2023</span>

          <h1 class="">HTML & CSS foundations</h1>

          <p class="">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="author-container">
          <img
            src="assets/images/image-avatar.webp"
            alt="picture of Greg hooper white background"
          />
          <span>Greg Hooper</span>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Mahavishnu Jneesh</a>.
    </footer>
  </body>
</html>
